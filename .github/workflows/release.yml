name: Publish SLRanger to PyPI

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "README.md"
      - "pyproject.toml"
      - "setup.py"
      - "SLRanger/**"
      - "tests/**"
  workflow_dispatch:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: Build and validate distributions
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build and test tools
        run: >-
          python -m pip install --upgrade
          pip build twine
          "numpy>=1.23,<2"
          "pandas>=2.1"

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: Build wheel and source distribution
        run: python -m build --sdist --wheel

      - name: Check distribution metadata
        run: python -m twine check --strict dist/*

      - name: Install the wheel and check the command
        run: |
          python -m pip install --no-deps dist/*.whl
          cd "$RUNNER_TEMP"
          operon_predict.py -h

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: python -c 'import os; from importlib.metadata import version; assert version("SLRanger") == os.environ["RELEASE_TAG"]'

      - name: Store distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-to-pypi:
    name: Publish distribution to PyPI
    needs: build
    if: github.event_name == 'release' && github.event.release.prerelease == false
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/SLRanger/
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
